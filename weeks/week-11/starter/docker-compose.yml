version: '3.8'

services:
  app:
    build: .
    container_name: items-svc-s19
    expose:
      - "8221"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=items_db
      - DB_USER=items_user
      - DB_PASSWORD=items_pass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8221/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - app-net
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: items-db-s19
    environment:
      POSTGRES_DB: items_db
      POSTGRES_USER: items_user
      POSTGRES_PASSWORD: items_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U items_user -d items_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-net

  gateway:
    image: nginx:alpine
    container_name: items-gateway-s19
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  pgdata: