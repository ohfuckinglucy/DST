apiVersion: apps/v1
kind: Deployment
metadata:
  name: comments-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: comments-app
  template:
    metadata:
      labels:
        app: comments-app
    spec:
      containers:
      - name: comments-container
        image: comments-s19:latest
        ports:
        - containerPort: 8138
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8138
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8138
          initialDelaySeconds: 2
          periodSeconds: 5
