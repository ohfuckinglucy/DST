version: '3.8'

services:
  comments-svc-s19:
    build:
      context: ./services/comments-service
      dockerfile: Dockerfile
    container_name: comments-svc-s19
    expose:
      - "8138"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8138/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-net

  users-svc-s19:
    build:
      context: ./services/users-service
      dockerfile: Dockerfile
    container_name: users-svc-s19
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - app-net

  gateway:
    image: nginx:alpine
    container_name: gateway-s19
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      comments-svc-s19:
        condition: service_healthy
      users-svc-s19:
        condition: service_healthy
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
