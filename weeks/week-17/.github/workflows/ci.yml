name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  PROJECT_CODE: comments-s19
  IMAGE_NAME: comments-s19

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt flake8 pytest
      - name: Lint
        run: flake8 . --select=E9,F63,F7,F82 --statistics
      - name: Test
        run: make test WEEK=17
      - name: Build Docker
        run: |
          docker build -t ${{ env.IMAGE_NAME }} -f services/comments-service/Dockerfile services/comments-service
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            weeks/week-17/ARCHITECTURE.md
            .github/workflows/ci.yml
