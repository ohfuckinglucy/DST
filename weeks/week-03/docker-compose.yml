version: '3.8'

services:
  service-logs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logs-svc-s19
    environment:
      - SERVICE_NAME=logs
    expose:
      - "8219"
    command: uvicorn main:app --host 0.0.0.0 --port 8219

  service-other:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: other-mock-svc
    environment:
      - SERVICE_NAME=other
    expose:
      - "8219"
    command: uvicorn main:app --host 0.0.0.0 --port 8219

  nginx-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - service-logs
      - service-other