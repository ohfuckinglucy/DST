syntax = "proto3";

package users.v1;

service UsersService {
  rpc GetUser (UserRequest) returns (UserResponse);

  rpc ListUsers (UserRequest) returns (stream UserResponse);
}

message UserRequest {
  string id = 1;
}

message UserResponse {
  string id = 1;
  string name = 2;
  string email = 3;
}
