name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      WEEK: "17"
      GROUP: "331"
      STUDENT_ID: "s19"
      PROJECT_CODE: "comments-s19"
      IMAGE_NAME: "comments-s19"
      SERVICE_DIR: "weeks/week-17/services/comments-service"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8 pytest

      - name: Линтер (flake8)
        run: |
          flake8 . --select=E9,F63,F7,F82 --statistics

      - name: Запуск тестов
        run: make test WEEK=${{ env.WEEK }}

      - name: Сборка Docker-образа
        run: |
          docker build -t ${{ env.IMAGE_NAME }} \
            -f ${{ env.SERVICE_DIR }}/Dockerfile \
            ${{ env.SERVICE_DIR }}

      - name: Подготовка артефактов
        run: |
          mkdir -p artifacts
          cp weeks/week-${{ env.WEEK }}/ARCHITECTURE.md artifacts/ || true
          cp .github/workflows/ci.yml artifacts/ || true

      - name: Публикация артефактов
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts