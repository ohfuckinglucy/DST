name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      WEEK: "14"
      GROUP: "331"
      STUDENT_ID: "s19"
      PROJECT_CODE: "users-s19" 
      IMAGE_NAME: "users-s19"

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8 pytest
          
      - name: Линтер (flake8)
        run: |
          flake8 . --select=E9,F63,F7,F82 --statistics
          
      - name: Запуск тестов
        run: make test WEEK=${{ env.WEEK }}
        
      - name: Сборка Docker-образа
        run: |
          docker build -t ${{ env.IMAGE_NAME }} -f weeks/week-10/Dockerfile .
          
      - name: Подготовка артефактов
        run: |
          mkdir -p artifacts
          # Копируем релевантные файлы для 14 недели
          cp weeks/week-${{ env.WEEK }}/README.md artifacts/ || true
          cp .github/workflows/ci.yml artifacts/ || true
          
      - name: Публикация артефактов
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts